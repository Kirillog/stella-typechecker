name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked --all-targets

      - name: Test
        run: cargo test --locked --all-targets

      - name: Pull etalon Docker image
        run: docker pull fizruk/stella

      - name: Etalon comparison test
        run: STELLA_COMPARE_ETALON=1 cargo test --locked -- --nocapture